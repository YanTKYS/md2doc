name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build src/md2doc/md2doc.csproj -c Release

      - name: Test (unit tests; Word integration tests skipped on CI)
        run: dotnet test tests/Md2Doc.Tests/Md2Doc.Tests.csproj -c Release --logger "console;verbosity=normal"
